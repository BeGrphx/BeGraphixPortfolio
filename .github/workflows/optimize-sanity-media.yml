name: Optimize Sanity media

on:
  repository_dispatch:
    types: [sanity-media-upload]
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

concurrency:
  group: sanity-media-pipeline
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  optimize:
    name: Transcode and publish videos
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure FFmpeg is available
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes ffmpeg
          fi
          ffmpeg -version

      - name: Optimize new Sanity videos
        run: node scripts/process-sanity-media.mjs
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: 1ixvdz59
          NEXT_PUBLIC_SANITY_DATASET: production
          NEXT_PUBLIC_SANITY_API_VERSION: 2024-01-01
          SANITY_API_WRITE_TOKEN: ${{ secrets.SANITY_API_WRITE_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: begraphix-media
          R2_PUBLIC_BASE_URL: https://pub-c4b621b3dd8349d5ac89e2e483980c73.r2.dev
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          SITE_URL: https://be-graphix-portfolio.vercel.app
